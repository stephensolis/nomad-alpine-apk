name: Build

on:
  push:
    branches: [master]

jobs:
  build:
    name: Build

    strategy:
      matrix:
        package:
          - name: nomad
            version: 2.0.0
          - name: nomad-driver-podman
            version: 0.6.4
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_SUMMARY: "false"
          DOCKER_BUILD_RECORD_UPLOAD: "false"
        with:
          tags: apk-packages
          file: Dockerfile
          context: ${{ matrix.package.name }}
          push: false
          load: true
          build-args: |
            PACKAGE_VERSION=${{ matrix.package.version }}
          secrets: |
            "apk_private_key=${{ secrets.APK_PRIVATE_KEY }}"
          secret-files: |
            apk_public_key=nomad-alpine-apk.rsa.pub

      - name: Extract packages
        uses: shrink/actions-docker-extract@v4
        with:
          image: apk-packages
          path: /home/builder/packages/builder/.
          destination: dist

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.package.name }}-${{ runner.arch }}
          path: |
            dist
            !dist/**/APKINDEX*

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: nomad-alpine-apk.rsa.pub

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: packages
          merge-multiple: true

      - name: Generate and sign APK index
        run: |
          echo "${{ secrets.APK_PRIVATE_KEY }}" > /tmp/nomad-alpine-apk.rsa
          chmod 600 /tmp/nomad-alpine-apk.rsa
          docker run --rm \
            -v "$PWD/packages:/packages" \
            -v "/tmp/nomad-alpine-apk.rsa:/nomad-alpine-apk.rsa:ro" \
            -v "$PWD/nomad-alpine-apk.rsa.pub:/etc/apk/keys/nomad-alpine-apk.rsa.pub:ro" \
            alpine:latest sh -c "
              apk add --no-cache alpine-sdk &&
              cd /packages/x86_64 &&
              apk index -o APKINDEX.tar.gz *.apk &&
              abuild-sign -k /nomad-alpine-apk.rsa APKINDEX.tar.gz &&
              cd /packages/aarch64 &&
              apk index -o APKINDEX.tar.gz *.apk &&
              abuild-sign -k /nomad-alpine-apk.rsa APKINDEX.tar.gz
            "
          rm -f /tmp/nomad-alpine-apk.rsa

      - name: Create release
        run: |
          NOTES="| Package | Version |
          | --- | --- |"
          for apk in packages/x86_64/*.apk; do
            filename=$(basename "$apk" .apk)
            name=$(echo "$filename" | sed -E 's/-[0-9]+\..*//')
            version=$(echo "$filename" | sed -E 's/.*-([0-9]+\.[0-9]+[^-]*)-r[0-9]+$/\1/')
            NOTES="$NOTES
          | $name | $version |"
          done

          gh release delete x86_64 --yes --cleanup-tag || true
          gh release create x86_64 packages/x86_64/* --notes "$NOTES"

          gh release delete aarch64 --yes --cleanup-tag || true
          gh release create aarch64 packages/aarch64/* --notes "$NOTES"
        env:
          GH_TOKEN: ${{ github.token }}
